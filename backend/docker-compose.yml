version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: minetech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: minetech
      POSTGRES_PASSWORD: minetech
      POSTGRES_DB: minetech
    ports:
      - "5432:5432"
    volumes:
      - minetech-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minetech"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: minetech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: minetech-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: minetech
      RABBITMQ_DEFAULT_PASS: minetech
    ports:
      - "5672:5672"
      - "15672:15672" # management UI: http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minetech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minetech
      MINIO_ROOT_PASSWORD: minetech123
    ports:
      - "9000:9000"
      - "9001:9001" # console UI: http://localhost:9001
    volumes:
      - minetech-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minetech-postgres-data:
  minetech-minio-data:
